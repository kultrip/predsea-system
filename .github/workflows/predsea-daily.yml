name: PredSea Daily Briefing

on:
  schedule:
    # GitHub cron is UTC. Run twice per hour at :30.
    - cron: "30 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: predsea-daily-briefing
  cancel-in-progress: false

jobs:
  run-daily-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Run PredSea briefing script
        env:
          GOOGLE_CLOUD_PROJECT: predsea-api
          PREDSEA_BIGQUERY_PROJECT: predsea-api
          PREDSEA_BIGQUERY_DATASET: predsea_validation
          PREDSEA_BIGQUERY_TABLE: evidence_rows
          PREDSEA_BIGQUERY_LOCATION: europe-west1
          PREDSEA_ENABLE_PUERTOS_OBSERVATIONS: "1"
          PREDSEA_ENABLE_PORTUS_OBSERVATIONS: "1"
          SOCIB_API_KEY: ${{ secrets.SOCIB_API_KEY }}
          COPERNICUSMARINE_SERVICE_USERNAME: ${{ secrets.COPERNICUSMARINE_SERVICE_USERNAME }}
          COPERNICUSMARINE_SERVICE_PASSWORD: ${{ secrets.COPERNICUSMARINE_SERVICE_PASSWORD }}
          PREDSEA_LOGO_PATH: assets/predsea_logo.png
          PREDSEA_SOURCE_TIMEOUT_SECONDS: "1800"
          PREDSEA_SOURCE_ATTEMPTS: "1"
          PREDSEA_SOCIB_THREDDS_ATTEMPTS: "3"
          PREDSEA_SOCIB_THREDDS_RETRY_DELAY_SECONDS: "20"
        run: |
          python -u scripts/generate_daily_briefing.py

      - name: Upload prediction outputs to Cloud Storage
        run: |
          DAY_DIR=$(find outputs -mindepth 1 -maxdepth 1 -type d -name '20*' | sort | tail -n 1)
          if [ -z "$DAY_DIR" ]; then
            echo "No dated output directory found under outputs/" >&2
            exit 1
          fi
          RUN_DATE=$(basename "$DAY_DIR")
          gcloud storage rsync --recursive "$DAY_DIR" "gs://predsea-daily-outputs/predictions/$RUN_DATE"

      - name: Export web demo bundle
        run: |
          python scripts/export_web_demo_bundle.py \
            --input-root outputs \
            --output-dir outputs/web-demo \
            --featured-route palma_ibiza

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: predsea-daily-output
          path: outputs/
          if-no-files-found: error
          retention-days: 14
