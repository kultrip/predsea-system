name: PredSea Provider Release Monitor

on:
  schedule:
    # Metadata-only probe. Records when provider forecast runs/update markers become visible.
    - cron: "10 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: predsea-provider-release-monitor
  cancel-in-progress: false

jobs:
  monitor-provider-releases:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Probe provider release metadata
        run: |
          python -u scripts/monitor_provider_releases.py \
            --output-dir outputs/provider-monitor \
            --timeout 30

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload provider monitor outputs to Cloud Storage
        run: |
          gcloud storage rsync --recursive outputs/provider-monitor gs://predsea-daily-outputs/provider-monitor

      - name: Upload provider monitor artifact
        uses: actions/upload-artifact@v4
        with:
          name: predsea-provider-release-monitor
          path: outputs/provider-monitor/
          if-no-files-found: error
          retention-days: 14
