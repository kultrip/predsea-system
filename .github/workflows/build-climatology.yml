name: Build PredSea Climatology Baseline

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Inclusive start date (YYYY-MM-DD)"
        required: false
        default: "2019-01-01"
      end_date:
        description: "Exclusive end date (YYYY-MM-DD)"
        required: false
        default: "2027-01-01"

permissions:
  contents: read

concurrency:
  group: predsea-climatology-baseline
  cancel-in-progress: false

jobs:
  build-climatology:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      # --- NUEVO PASO INTEGRADO: Descarga externa directa ---
      - name: Ingest Historical Data from Copernicus and EMODnet Web Pages
        env:
          GOOGLE_CLOUD_PROJECT: predsea-api
          COPERNICUS_MARINE_USER: ${{ secrets.COPERNICUS_USER }}
          COPERNICUS_MARINE_PASSWORD: ${{ secrets.COPERNICUS_PASSWORD }}
          START_DATE: ${{ inputs.start_date }}
          END_DATE: ${{ inputs.end_date }}
        run: |
          python scripts/ingest_external_sources.py \
            --project predsea-api \
            --dataset predsea_validation \
            --table evidence_rows

      # --- PASO FINAL: Consolidación en la base unificada ---
      - name: Build climatology baseline
        env:
          GOOGLE_CLOUD_PROJECT: predsea-api
          PREDSEA_BIGQUERY_PROJECT: predsea-api
          PREDSEA_BIGQUERY_DATASET: predsea_validation
          PREDSEA_BIGQUERY_EVIDENCE_TABLE: evidence_rows
          PREDSEA_BIGQUERY_CLIMATOLOGY_TABLE: climatology_baseline
          PREDSEA_BIGQUERY_LOCATION: EU
          START_DATE: ${{ inputs.start_date }}
          END_DATE: ${{ inputs.end_date }}
        run: |
          python scripts/build_climatology.py \
            --project predsea-api \
            --dataset predsea_validation \
            --evidence-table evidence_rows \
            --climatology-table universal_telemetry_baseline \
            --location EU \
            --start-date "$START_DATE" \
            --end-date "$END_DATE"
